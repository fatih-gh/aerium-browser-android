name: Upstream watch

# Checks weekly whether the upstream project (and thus the Chromium base)
# has a newer release than what Aerium is currently built on. Purely
# informational; never builds.
#
# Notification mechanism: this repo has Issues disabled, so we can't open a
# tracking issue (gh issue create/list just errors out - that's how this
# silently broke for weeks before 2026-07-20). Instead: fail the step so the
# run itself shows red in the Actions tab, and write the details to the job
# summary. Stays red every week (the .upstream-seen guard below is
# intentionally NOT auto-updated here) until a human does the actual sync
# and updates .github/.upstream-seen as the last step of that, per
# UPDATING.md.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Compare upstream vs current
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM: jqssun/android-helium-browser
        run: |
          set -euo pipefail

          current="$(grep -m1 -oE '[0-9]+(\.[0-9]+){3}' vanadium/args.gn || echo unknown)"
          upstream_sha="$(gh api repos/$UPSTREAM/commits/main --jq '.sha' | cut -c1-7)"
          upstream_msg="$(gh api repos/$UPSTREAM/commits/main --jq '.commit.message' | head -n1)"
          upstream_tag="$(gh api "repos/$UPSTREAM/tags?per_page=1" --jq '.[0].name' || echo none)"

          echo "current base: $current"
          echo "upstream tag: $upstream_tag  head: $upstream_sha"

          seen_file=".github/.upstream-seen"
          seen="$(cat "$seen_file" 2>/dev/null || echo none)"
          if [ "$upstream_sha" = "$seen" ]; then
            echo "Already reported $upstream_sha; nothing to do."
            echo "### Upstream watch: up to date ($upstream_sha)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### ⚠️ Upstream update available: $upstream_tag ($upstream_sha)"
            echo ""
            echo "Upstream **$UPSTREAM** has moved."
            echo ""
            echo "- Latest tag: \`$upstream_tag\`"
            echo "- Latest commit: \`$upstream_sha\` — $upstream_msg"
            echo "- Aerium base: \`$current\`"
            echo ""
            echo "Sync steps are in [UPDATING.md](../blob/main/UPDATING.md). Remember: upstream force-pushes, so cherry-pick patch.sh changes rather than merging."
            echo ""
            echo "This job will keep failing on every scheduled run until \`.github/.upstream-seen\` is updated to \`$upstream_sha\` (the last step of the sync in UPDATING.md)."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::error::Upstream update available: $upstream_tag ($upstream_sha) - see job summary"
          exit 1
