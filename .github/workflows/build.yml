          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-6:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-5
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
