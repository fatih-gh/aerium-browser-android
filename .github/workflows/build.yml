          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  check-completion:
    runs-on: ubuntu-latest
    needs: build-16
    steps:
      - name: Verify build finished
        run: |
          if [ "${{ needs.build-16.outputs.finished }}" != "true" ]; then
            echo "Build did not finish within 16 stages; dispatch the workflow again to continue from the saved tree."
            exit 1
          fi
          echo "Build finished - APK is in the aerium-android artifact."
