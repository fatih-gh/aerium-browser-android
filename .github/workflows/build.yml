name: Build

on:
  workflow_dispatch:
    inputs:
      fresh:
        description: 'Ignore the saved build tree and start from scratch'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: aerium-android-build
  cancel-in-progress: false

jobs:
  build-1:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 1
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: 'false'
          from_artifact: ${{ inputs.fresh == true && 'never' || 'auto' }}
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-2:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-1
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 2
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-1.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-3:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-2
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
