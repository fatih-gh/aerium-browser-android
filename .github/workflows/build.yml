name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'fastlane/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      fresh:
        description: 'Ignore the saved build tree and start from scratch'
        type: boolean
        required: false
        default: false
      resume_run_id:
        description: 'Resume from the build tree saved by this workflow run id (artifacts are per-run; a new run cannot see an old run''s tree without this)'
        type: string
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: aerium-android-build
  cancel-in-progress: true

jobs:
  build-1:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 1
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: 'false'
          from_artifact: ${{ inputs.fresh == true && 'never' || 'auto' }}
          restore_run_id: ${{ inputs.resume_run_id || '' }}
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-2:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-1
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 2
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-1.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-3:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-2
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 3
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-2.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-4:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-3
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 4
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-3.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-5:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-4
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 5
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-4.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-6:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-5
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 6
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-5.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-7:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-6
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 7
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-6.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-8:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-7
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 8
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-7.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-9:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-8
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 9
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-8.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-10:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-9
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 10
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-9.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-11:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-10
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 11
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-10.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-12:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-11
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 12
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-11.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-13:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-12
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 13
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-12.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-14:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-13
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 14
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-13.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-15:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-14
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 15
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-14.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  build-16:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: build-15
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Stage 16
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ needs.build-15.outputs.finished }}
          from_artifact: 'auto'
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build-16
    if: ${{ needs.build-16.outputs.finished == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Verify build finished
        run: echo "Build finished - publishing the Aerium APK."
      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: aerium-android
          path: release
      - name: Resolve version
        id: ver
        run: |
          V="$(cat release/version.txt 2>/dev/null || true)"
          [ -z "$V" ] && V="$(ls release/aerium-*-arm64-v8a.apk | sed -E 's/.*aerium-([0-9.]+)-arm64.*/\1/' | head -n1)"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"
      - name: Compute checksum
        run: |
          set -euo pipefail
          cd release
          sha256sum aerium-*-arm64-v8a.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Aerium ${{ steps.ver.outputs.version }} (arm64)
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/aerium-*-arm64-v8a.apk
            release/SHA256SUMS.txt

  check-completion:
    runs-on: ubuntu-latest
    needs: build-16
    if: ${{ always() }}
    steps:
      - name: Verify build finished
        run: |
          if [ "${{ needs.build-16.outputs.finished }}" != "true" ]; then
            echo "Build did not finish within 16 stages; dispatch the workflow again to continue from the saved tree."
            exit 1
          fi
          echo "Build finished - APK is in the aerium-android artifact and published as a release."
