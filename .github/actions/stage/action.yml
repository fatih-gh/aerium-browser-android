name: 'Stage'
description: 'One resumable build stage: restore tree, build for a time slice, save tree or publish the APK'
inputs:
  finished:
    description: 'true if a previous stage already finished the build'
    required: true
  from_artifact:
    description: '"auto" to resume from a saved build tree when one exists, "never" to force a fresh start'
    required: false
    default: 'auto'
  restore_run_id:
    description: 'Workflow run id to restore the saved build tree from (empty = this run). download-artifact only sees the current run by default, so resuming a failed run from a NEW run requires passing that run''s id here.'
    required: false
    default: ''
outputs:
  finished:
    description: 'true once the signed APK has been produced'
    value: ${{ steps.result.outputs.finished }}
runs:
  using: 'composite'
  steps:
    - name: Maximize build space
      if: inputs.finished != 'true'
      uses: easimon/maximize-build-space@v10
      with:
        # The swap file is carved out of the root reserve, so the reserve
        # must cover swap + depot_tools + apt + misc root writes - anything
        # beyond that is disk taken AWAY from the build volume. A full fresh
        # Android Chromium checkout + partial compile has repeatedly filled
        # the disk (exit 137 at stage 1, i.e. not accumulation across
        # stages), so reserve/swap are kept lean: -j2 lowered peak memory
        # enough that a large swap buffer is no longer the priority, disk
        # headroom for the source tree is.
        root-reserve-mb: '10240'
        temp-reserve-mb: '2048'
        swap-size-mb: '6144'
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        build-mount-path: '${{ github.workspace }}/chromium'

    - name: Restore build tree (best effort)
      if: inputs.finished != 'true' && inputs.from_artifact != 'never' && inputs.restore_run_id == ''
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: build-artifact-android
        path: ${{ github.workspace }}/chromium

    - name: Restore build tree from another run (best effort)
      if: inputs.finished != 'true' && inputs.from_artifact != 'never' && inputs.restore_run_id != ''
      uses: actions/download-artifact@v8
      continue-on-error: true
      with:
        name: build-artifact-android
        path: ${{ github.workspace }}/chromium
        run-id: ${{ inputs.restore_run_id }}
        github-token: ${{ github.token }}

    - name: Unpack build tree
      if: inputs.finished != 'true'
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        if [ -f chromium/artifacts.tar.zst ]; then
          echo "Resuming from saved build tree"
          tar -x -I 'zstd -T0' -f chromium/artifacts.tar.zst
          rm -f chromium/artifacts.tar.zst
        else
          echo "No saved build tree; starting fresh"
        fi
        df -h /

    - name: Build
      id: build
      if: inputs.finished != 'true'
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        chmod +x *.sh res/*.sh
        free -h || true
        df -h || true
        set +e
        ./build.sh --ci
        echo "code=$?" >> "$GITHUB_OUTPUT"
        df -h || true

    - name: Disk usage breakdown (diagnostic, only on failure)
      if: inputs.finished != 'true' && steps.build.outputs.code != '0'
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        echo "--- top-level chromium/ ---"
        du -sh --max-depth=1 chromium 2>/dev/null | sort -rh | head -10 || true
        echo "--- top-level chromium/src/ ---"
        du -sh --max-depth=1 chromium/src 2>/dev/null | sort -rh | head -20 || true
        echo "--- chromium/src/out/Default/ ---"
        du -sh --max-depth=1 chromium/src/out/Default 2>/dev/null | sort -rh | head -10 || true
        echo "--- root filesystem outside chromium/ (top consumers) ---"
        du -sh --max-depth=2 /home /usr /opt /var 2>/dev/null | sort -rh | head -15 || true

    - name: Pack build tree
      id: pack
      if: inputs.finished != 'true'
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        if [ -f release/finished.marker ]; then
          echo "packed=finished" >> "$GITHUB_OUTPUT"
        elif [ -f chromium/src/BUILD.gn ] && [ -f chromium/src/out/Default/args.gn ] && [ -f chromium/src/out/Default/build.ninja ]; then
          # Save progress even when this stage's build failed, so a fixed
          # workflow can resume instead of starting over. build.ninja is
          # required on top of BUILD.gn/args.gn: a tree where gn gen itself
          # failed (e.g. a bad args.gn flag - run 29985315083) has the first
          # two but no build graph, and uploading it would overwrite the
          # previous GOOD checkpoint (the artifact name is shared across
          # runs with overwrite: true), destroying resumable progress in
          # exchange for a tree that can't be resumed anyway.
          EXTRA=""
          for f in chromium/.gclient_entries chromium/.gclient_previous_sync_commits; do
            [ -f "$f" ] && EXTRA="$EXTRA $f"
          done
          # tar exit code 1 only means files changed while reading (siso's
          # volatile state journal etc.) - the archive is still usable.
          set +e
          tar -c -I 'zstd -T0 -3' -f chromium/artifacts.tar.zst \
            --warning=no-file-changed \
            --exclude='chromium/artifacts.tar.zst' \
            --exclude='chromium/src/out/Default/.siso_fs_state.journal' \
            chromium/src chromium/.gclient $EXTRA
          RC=$?
          set -e
          if [ $RC -gt 1 ]; then
            echo "tar failed with exit code $RC"
            exit $RC
          fi
          ls -la chromium/artifacts.tar.zst
          echo "packed=intermediate" >> "$GITHUB_OUTPUT"
        else
          echo "Source setup did not complete; nothing worth saving"
          echo "packed=none" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload build tree
      if: inputs.finished != 'true' && steps.pack.outputs.packed == 'intermediate'
      uses: actions/upload-artifact@v7
      with:
        name: build-artifact-android
        path: ${{ github.workspace }}/chromium/artifacts.tar.zst
        retention-days: 4
        compression-level: 0
        overwrite: true

    - name: Upload final APK
      if: inputs.finished != 'true' && steps.pack.outputs.packed == 'finished'
      uses: actions/upload-artifact@v7
      with:
        name: aerium-android
        path: ${{ github.workspace }}/release/
        retention-days: 30
        compression-level: 0
        overwrite: true

    - name: Fail stage if the build failed
      if: inputs.finished != 'true' && steps.build.outputs.code != '0'
      shell: bash
      run: |
        echo "build.sh exited with code ${{ steps.build.outputs.code }} (tree was saved for resume)"
        exit 1

    - name: Set result
      id: result
      shell: bash
      run: |
        if [ "${{ inputs.finished }}" = "true" ] || [ "${{ steps.pack.outputs.packed }}" = "finished" ]; then
          echo "finished=true" >> "$GITHUB_OUTPUT"
        else
          echo "finished=false" >> "$GITHUB_OUTPUT"
        fi
